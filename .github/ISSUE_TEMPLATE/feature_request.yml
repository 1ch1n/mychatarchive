name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe what you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is frustrating or missing today?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of MyChatArchive does this relate to?
      options:
        - CLI
        - MCP Server
        - Import / Parsers
        - Embeddings
        - Summarization
        - Search
        - Export
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details, mockups, or references.
